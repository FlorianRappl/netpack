name: Publish

# Release pipeline, four jobs:
#   1. build   — compile the native AOT binary once per platform (Linux x64,
#                Linux arm64, macOS arm64, Windows x64, Windows arm64) and
#                upload each as an artifact.
#   2. publish — assemble the per-platform npm packages from those artifacts and
#                publish them together with the central wrapper package.
#   3. nuget   — pack the embeddable core library (src/NetPack) and the MSBuild
#                integration (src/NetPack.Build) and push both to NuGet.org as
#                `NetPack.Core` and `NetPack.Build`. Independent of 1/2.
#   4. pages   — build both Astro sites (www/home, the landing page, and
#                www/docs, which renders the repo-root docs/*.md) and push
#                them together to the `gh-pages` branch: the landing page at
#                the root, the docs site under /docs/. Independent of 1/2,
#                so it runs in parallel with the npm release.
#
# Publishing uses Trusted Publishing (OIDC) everywhere: no npm or NuGet API
# token / secret is needed.
#   - npm: configure trusted publishing on npmjs.com for each of `netpack`,
#     `@netpack/linux-x64`, `@netpack/linux-arm64`, `@netpack/osx-arm64`,
#     `@netpack/win-x64`, and `@netpack/win-arm64`, pointing at this repository
#     and this workflow file (.github/workflows/publish.yml).
#   - NuGet: on nuget.org create a Trusted Publishing policy covering the
#     `NetPack.Core` and `NetPack.Build` packages (Repository Owner +
#     Repository + Workflow File "publish.yml"), and set the `NUGET_USER` repo
#     secret to your nuget.org username (the profile name — NOT a token, and NOT
#     your email). See https://learn.microsoft.com/nuget/nuget-org/trusted-publishing.
#
# The published version is the <VersionPrefix> in src/Directory.Build.props; bump
# it (and tag the matching release) before triggering this workflow.
#
# For the `pages` job, GitHub Pages must be configured (Settings > Pages) to
# deploy from the `gh-pages` branch; the branch is created automatically on
# first run. Both sites use only relative links, so this also works unchanged
# if they're ever moved to a different path or domain.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing + provenance

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-14 # Apple Silicon runner
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish native binary
        run: >-
          dotnet publish src/NetPack.Cli/NetPack.Cli.csproj
          -r ${{ matrix.rid }} -c Release
          -p:DebugType=None -p:DebugSymbols=false

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.rid }}
          path: src/NetPack.Cli/bin/Release/net8.0/${{ matrix.rid }}/publish/
          if-no-files-found: error

  publish:
    name: Publish npm packages
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Ensure npm supports trusted publishing (avoid package issue; https://github.com/npm/cli/issues/9722)
        run: npm install -g npm@11

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble native packages
        run: |
          set -euo pipefail
          for rid in linux-x64 linux-arm64 osx-arm64 win-x64 win-arm64; do
            dest="src/npm/@netpack/$rid/bin"
            rm -rf "$dest"
            mkdir -p "$dest"
            cp -r "artifacts/binary-$rid/." "$dest/"
          done
          chmod +x src/npm/@netpack/linux-x64/bin/netpack src/npm/@netpack/linux-arm64/bin/netpack src/npm/@netpack/osx-arm64/bin/netpack

      - name: Build wrapper and sync versions
        working-directory: src/npm/dev
        run: |
          npm install --no-audit --no-fund
          npm run build
          npm run update-version

      - name: Publish native packages
        run: |
          set -euo pipefail
          for rid in linux-x64 linux-arm64 osx-arm64 win-x64 win-arm64; do
            ( cd "src/npm/@netpack/$rid" && npm publish --provenance --access public )
          done

      - name: Publish central package
        working-directory: src/npm/netpack
        run: npm publish --provenance --access public

  nuget:
    name: Publish NuGet (core library)
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for NuGet trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack core library
        run: >-
          dotnet pack src/NetPack/NetPack.csproj
          -c Release
          -o ${{ runner.temp }}/nupkgs

      - name: Pack MSBuild integration
        run: >-
          dotnet pack src/NetPack.Build/NetPack.Build.csproj
          -c Release
          -o ${{ runner.temp }}/nupkgs

      # Exchange the GitHub OIDC token for a short-lived NuGet API key. No stored
      # NuGet token; `NUGET_USER` is just the nuget.org profile name.
      - name: NuGet login (OIDC → temporary API key)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push package
        run: >-
          dotnet nuget push "${{ runner.temp }}/nupkgs/*.nupkg"
          --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

  pages:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write # required to push the built sites to gh-pages
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies (landing page)
        working-directory: www/home
        run: npm install --no-audit --no-fund

      - name: Install dependencies (documentation page)
        working-directory: www/docs
        run: npm install --no-audit --no-fund

      - name: Build landing page
        working-directory: www/home
        run: npm run build

      - name: Build documentation page
        working-directory: www/docs
        run: npm run build

      - name: Install dependencies (docs)
        working-directory: www/docs
        run: npm install --no-audit --no-fund

      - name: Build docs site
        working-directory: www/docs
        run: npm run build

      - name: Assemble combined site
        run: |
          set -euo pipefail
          rm -rf deploy
          mkdir -p deploy
          echo "netpack.anglevisions.com" > deploy/CNAME
          cp -r www/home/dist/. deploy/
          mkdir -p deploy/docs
          cp -r www/docs/dist/. deploy/docs/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: deploy
          publish_branch: gh-pages
