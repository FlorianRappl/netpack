name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test src/NetPack.sln -c Release

  aot-smoke:
    # Cross-platform AOT publish is slow, so only validate it on pushes to main.
    name: AOT publish smoke (${{ matrix.rid }})
    if: github.event_name == 'push'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
          - rid: linux-arm64
            os: ubuntu-24.04-arm
          - rid: osx-arm64
            os: macos-14
          - rid: win-x64
            os: windows-latest
          - rid: win-arm64
            os: windows-11-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish (AOT)
        run: >-
          dotnet publish src/NetPack.Cli/NetPack.Cli.csproj
          -r ${{ matrix.rid }} -c Release
          -p:DebugType=None -p:DebugSymbols=false
